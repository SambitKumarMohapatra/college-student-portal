spring.application.name=lms

# --- PostgreSQL ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lms_db}
spring.datasource.username=postgres
spring.datasource.password=Postgresql@2002
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
app.jwt.secret=${JWT_SECRET:LandmineSoftLMSSecretKey2024VeryLongSecretKeyForSecurity!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- Swagger ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# --- Server ---
server.port=${PORT:8080}
